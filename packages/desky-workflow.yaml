# Desky standing desk workflow package
#
# Bundles the desky component plus the sit/stand automation
# (memory presets, working-mode schedule) shared across devices.
#
# Usage in your device YAML:
#
#   substitutions:
#     desky_up_pin: GPIO8       # override only what differs from defaults below
#
#   packages:
#     desky_workflow:
#       url: https://github.com/gene891212/custom-esphome-components
#       file: packages/desky-workflow.yaml
#       ref: main
#
# Substitutions defined in the device YAML take precedence over the
# defaults declared here.

substitutions:
  desky_up_pin: GPIO8       # Move up | green wire
  desky_down_pin: GPIO7     # Move down | yellow wire
  desky_purple_pin: GPIO10  # purple wire
  desky_request_pin: GPIO12
  desky_memory_pin: GPIO13
  desky_uart_rx_pin: GPIO44
  desky_stand_sit_threshold: "80"
  desky_sitting_minutes: "50"
  desky_standing_minutes: "15"

external_components:
  # Fetch the desky component from this repo
  - source:
      type: git
      url: https://github.com/gene891212/custom-esphome-components
      ref: main
    components: [desky]

uart:
  - id: desk_uart
    baud_rate: 9600
    rx_pin: ${desky_uart_rx_pin}

script:
  # Re-evaluates is_sitting from the current height/threshold, without
  # waiting for a new height reading from the desk.
  - id: evaluate_is_sitting
    then:
      - if:
          condition:
            lambda: 'return id(stand_sit_height_threshold).state >= id(desk_height).state;'
          then:
            binary_sensor.template.publish:
              # Sitting Mode
              id: is_sitting
              state: ON
          else:
            binary_sensor.template.publish:
              # Standing Mode
              id: is_sitting
              state: OFF

  # script mode defaults to "single", which no-ops if already running,
  # so restarting the schedule needs an explicit stop before execute.
  - id: restart_schedule
    then:
      - script.stop: sit_stand_schedule
      - script.execute: sit_stand_schedule

  - id: sit_stand_schedule
    then:
      - if:
          # Check if the working mode is enabled
          condition:
            switch.is_on: is_working
          then:
            - if:
                condition:
                  binary_sensor.is_on: is_sitting
                then:
                  - logger.log: "Sitting timer (re)started"
                  # Convert unit from minutes to milliseconds
                  - delay: !lambda "return id(sitting_time).state * 60 * 1000;"
                  - logger.log: "Sitting time up. Take a break"
                  # Adjust desk to standing height
                  - button.press: memory_2
                else:
                  - logger.log: "Standing timer (re)started"
                  - delay: !lambda "return id(standing_time).state * 60 * 1000;"
                  # Adjust desk to sitting height
                  - logger.log: "Standing time up."
                  - button.press: memory_1

desky:
  id: my_desk
  height: # Sensor publishing the current height
    name: Desk Height
    id: desk_height
    accuracy_decimals: 1
    unit_of_measurement: cm
    # Any other sensor options
    filters:
      - delta: 0.05 # Only send values to HA if they change
      - throttle: 200ms # Limit values sent to Ha to 5 per sec.
      - multiply: 0.1 # Convert from mm to cm
    on_value:
      then:
        - script.execute: evaluate_is_sitting

binary_sensor:
  - platform: template
    id: is_sitting
    name: "is Sitting"
    # If adjust desk height manually, restart the script to reset the timer
    on_state:
      then:
        - script.execute: restart_schedule

output:
  - platform: gpio
    pin:
      number: ${desky_up_pin}
      allow_other_uses: true
    id: up_green_wire
    inverted: true
  - platform: gpio
    pin:
      number: ${desky_down_pin}
      allow_other_uses: true
    id: down_yellow_wire
    inverted: true
  - platform: gpio
    pin: ${desky_purple_pin}
    id: purple_wire
    inverted: true

  - platform: gpio
    pin: ${desky_request_pin}
    id: request_height_pin
    inverted: true

  - platform: gpio
    pin: ${desky_memory_pin}
    id: memory_pin
    inverted: true

button:
  # Wake up the desk and request it sends its height
  - platform: output
    name: "Request Desk Height"
    output: request_height_pin
    id: wake_desk_and_get_height
    duration: 300ms

  - platform: output
    name: "Memory Setting Mode"
    output: memory_pin
    id: memory_setting_mode
    duration: 300ms

  # Set memory's desk height
  - platform: template
    name: "Save Height in Memory 1"
    id: save_memory_1
    on_press:
      then:
        - button.press: memory_setting_mode
        - delay: 300ms
        - button.press: memory_1

  - platform: template
    name: "Save Height in Memory 2"
    id: save_memory_2
    on_press:
      then:
        - button.press: memory_setting_mode
        - delay: 300ms
        - button.press: memory_2

  - platform: template
    name: "Save Height in Memory 3"
    id: save_memory_3
    on_press:
      then:
        - button.press: memory_setting_mode
        - delay: 300ms
        - button.press: memory_3

  # Memory Buttons
  - platform: template
    name: "M1"
    id: memory_1
    on_press:
      then:
        - output.turn_on: up_green_wire
        - output.turn_on: down_yellow_wire
        - delay: 300ms
        - output.turn_off: down_yellow_wire
        - output.turn_off: up_green_wire

  - platform: output
    output: purple_wire
    name: "M2"
    id: memory_2
    duration: 300ms

  - platform: template
    name: "M3"
    id: memory_3
    on_press:
      then:
        - output.turn_on: purple_wire
        - output.turn_on: down_yellow_wire
        - delay: 300ms
        - output.turn_off: down_yellow_wire
        - output.turn_off: purple_wire

number:
  # Define "Working" mode variables.
  - platform: template
    id: stand_sit_height_threshold
    name: "Stand and Sit Height Threshold"
    optimistic: true
    unit_of_measurement: cm
    # Limit the range
    min_value: 60
    max_value: 130
    step: 0.1
    restore_value: true
    initial_value: ${desky_stand_sit_threshold}
    on_value:
      then:
        # Changing the threshold can flip sitting/standing immediately,
        # even while the desk itself isn't moving
        - script.execute: evaluate_is_sitting
        - script.execute: restart_schedule

  - platform: template
    id: sitting_time
    name: "Sitting Time"
    optimistic: true
    unit_of_measurement: mins
    min_value: 0
    max_value: 60
    step: 1
    restore_value: true
    initial_value: ${desky_sitting_minutes}
    on_value:
      then:
        - script.execute: restart_schedule

  - platform: template
    id: standing_time
    name: "Standing Time"
    optimistic: true
    unit_of_measurement: mins
    min_value: 0
    max_value: 60
    step: 1
    restore_value: true
    initial_value: ${desky_standing_minutes}
    on_value:
      then:
        - script.execute: restart_schedule

switch:
  # Raise the desk
  - platform: gpio
    id: raise_desk
    name: "Raise Desk"
    pin:
      number: ${desky_up_pin}
      inverted: true
      allow_other_uses: true
    interlock: lower_desk
    on_turn_on:
      # Auto off after 15s just in case
      - delay: 15s
      - switch.turn_off: raise_desk

  # Lower the desk
  - platform: gpio
    id: lower_desk
    name: "Lower Desk"
    pin:
      number: ${desky_down_pin}
      inverted: true
      allow_other_uses: true
    interlock: raise_desk
    on_turn_on:
      # Auto off after 15s just in case
      - delay: 15s
      - switch.turn_off: lower_desk

  - platform: template
    id: is_working
    name: "Work"
    optimistic: true
    on_turn_on:
      - script.execute: restart_schedule
    on_turn_off:
      - script.stop: sit_stand_schedule
