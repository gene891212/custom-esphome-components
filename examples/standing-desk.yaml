esphome:
  name: standing-desk
  friendly_name: Standing Desk

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret standing_desk_api_key

ota:
  platform: esphome
  password: !secret standing_desk_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Standing-Desk Fallback Hotspot"
    password: !secret standing_desk_ap_password

# web_server:
#   port: 80
#   version: 3

# Enable captive portal for WiFi configuration
captive_portal:

external_components:
  # Fetch the desky component from this repo
  - source:
      type: git
      url: https://github.com/gene891212/custom-esphome-components
      ref: main
    components: [desky]

uart:
  - id: desk_uart
    baud_rate: 9600
    rx_pin: 44
    # You can uncomment the debug section below to see UART messages.
    # debug:
    # direction: RX
    # dummy_receiver: true
    # after:
    # bytes: 4
    # sequence:
    # - lambda: UARTDebug::log_int(direction, bytes, ',');

script:
  - id: toggle_working_height_by_time
    then:
      - if:
          # Check if the working mode is enabled
          condition:
            switch.is_on: is_working
          then:
            - if:
                condition:
                  binary_sensor.is_on: is_sitting
                then:
                  # Convert unit from minutes to milliseconds
                  - delay: !lambda "return id(sitting_time).state * 60 * 1000;"
                  - logger.log: "Sitting time up. Take a break"
                  # Adjust desk to standing height
                  - button.press: memory_3
                else:
                  - delay: !lambda "return id(standing_time).state * 60 * 1000;"
                  # Adjust desk to sitting height
                  - logger.log: "Standing time up."
                  - button.press: memory_1

desky:
  id: my_desk
  # Uncomment this block to use Ssieb's move_to component function.
  # up:
  # number: 4 #D2
  # inverted: true
  # down:
  # number: 5 #D1
  # inverted: true
  # stopping_distance: 15  # optional distance from target to turn off moving, default 15
  height: # Sensor publishing the current height
    name: Desk Height
    id: desk_height
    accuracy_decimals: 1
    unit_of_measurement: cm
    # Any other sensor options
    filters:
      - delta: 0.05 # Only send values to HA if they change
      - throttle: 200ms # Limit values sent to Ha to 5 per sec.
      - multiply: 0.1 # Convert from mm to cm
    on_value:
      then:
        # Setting the working mode
        - if:
            condition:
              lambda: 'return id(stand_sit_height_threshold).state >= id(desk_height).state;'
            then:
              binary_sensor.template.publish:
                # Sitting Mode
                id: is_sitting
                state: ON
            else:
              binary_sensor.template.publish:
                # Standing Mode
                id: is_sitting
                state: OFF

binary_sensor:
  - platform: template
    id: is_sitting
    name: "is Sitting"
    # If adjust desk height manually, restart the script to reset the timer
    on_state:
      then:
        - script.stop: toggle_working_height_by_time
        - script.execute: toggle_working_height_by_time

# GPIO2 conflict with memory_pin
# light:
#   - platform: status_led
#     name: "Switch state"
#     pin:
#       number: GPIO2
#       inverted: true
#       allow_other_uses: true

substitutions:
  # Use your own ESP pin values
  desky_purple_pin: GPIO10 # Purple wire
  desky_down_pin: GPIO7 # Move desk down | Yellow wire
  desky_up_pin: GPIO8  # Move desk up | Green wire

output:
  - platform: gpio
    pin:
      number: ${desky_up_pin}
      allow_other_uses: true
    id: up_green_wire
    inverted: true
  - platform: gpio
    pin:
      number: ${desky_down_pin}
      allow_other_uses: true
    id: down_yellow_wire
    inverted: true
  - platform: gpio
    pin: ${desky_purple_pin}
    id: purple_wire
    inverted: true

  - platform: gpio
    pin: GPIO12
    id: request_height_pin
    inverted: true

  - platform: gpio
    pin:
      number: GPIO13
    id: memory_pin
    inverted: true

button:
  # Wake up the desk and request it sends its height
  - platform: output
    name: "Request Desk Height"
    output: request_height_pin
    id: wake_desk_and_get_height
    duration: 300ms

  - platform: output
    name: "Memory Setting Mode"
    output: memory_pin
    id: memory_setting_mode
    duration: 300ms

  # Set memory's desk height
  - platform: template
    name: "Save Height in Memory 1"
    id: save_memory_1
    on_press:
      then:
        - button.press: memory_setting_mode
        - delay: 300ms
        - button.press: memory_1

  - platform: template
    name: "Save Height in Memory 2"
    id: save_memory_2
    on_press:
      then:
        - button.press: memory_setting_mode
        - delay: 300ms
        - button.press: memory_2

  - platform: template
    name: "Save Height in Memory 3"
    id: save_memory_3
    on_press:
      then:
        - button.press: memory_setting_mode
        - delay: 300ms
        - button.press: memory_3

  # Memory Buttons
  - platform: template
    name: 1
    id: memory_1
    on_press:
      then:
        - output.turn_on: up_green_wire
        - output.turn_on: down_yellow_wire
        - delay: 300ms
        - output.turn_off: down_yellow_wire
        - output.turn_off: up_green_wire

  - platform: output
    output: purple_wire
    name: 2
    id: memory_2
    duration: 300ms

  - platform: template
    name: 3
    id: memory_3
    on_press:
      then:
        - output.turn_on: purple_wire
        - output.turn_on: down_yellow_wire
        - delay: 300ms
        - output.turn_off: down_yellow_wire
        - output.turn_off: purple_wire

number:
  # Define "Working" mode variables.
  - platform: template
    id: stand_sit_height_threshold
    name: "Stand and Sit Height Threshold"
    optimistic: true
    unit_of_measurement: cm
    # Limit the range
    min_value: 60
    max_value: 130
    step: 0.1
    restore_value: true
    initial_value: 80
    on_value:
      then:
        - script.stop: toggle_working_height_by_time
        - script.execute: toggle_working_height_by_time

  - platform: template
    id: sitting_time
    name: "Sitting Time"
    optimistic: true
    unit_of_measurement: mins
    min_value: 0
    max_value: 60
    step: 1
    restore_value: true
    initial_value: 50
    on_value:
      then:
        - script.stop: toggle_working_height_by_time
        - script.execute: toggle_working_height_by_time

  - platform: template
    id: standing_time
    name: "Standing Time"
    optimistic: true
    unit_of_measurement: mins
    min_value: 0
    max_value: 60
    step: 1
    restore_value: true
    initial_value: 15
    on_value:
      then:
        - script.stop: toggle_working_height_by_time
        - script.execute: toggle_working_height_by_time

switch:
  # Raise the desk
  - platform: gpio
    id: raise_desk
    name: "Raise Desk"
    pin:
      number: ${desky_up_pin}
      # mode: INPUT_PULLUP
      inverted: true
      allow_other_uses: true
    interlock: lower_desk
    on_turn_on:
      # Auto off after 15s just in case
      - delay: 15s
      - switch.turn_off: raise_desk

  # Lower the desk
  - platform: gpio
    id: lower_desk
    name: "Lower Desk"
    pin:
      number: ${desky_down_pin}
      # mode: INPUT_PULLUP
      inverted: true
      allow_other_uses: true
    interlock: raise_desk
    on_turn_on:
      # Auto off after 15s just in case
      - delay: 15s
      - switch.turn_off: lower_desk

  - platform: template
    id: is_working
    name: "Working"
    optimistic: true
    on_turn_on:
      - script.stop: toggle_working_height_by_time
      - script.execute: toggle_working_height_by_time
    on_turn_off:
      - script.stop: toggle_working_height_by_time
